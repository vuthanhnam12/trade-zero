<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Pipu — Học trade từ con số 0</title>
<style>
  :root{
    /* ====== Bảng màu ĐẠI DƯƠNG — sáng = mặt biển ====== */
    --blue:#0ea5e9; --blue-d:#0284c7;                       /* thương hiệu / lựa chọn */
    --green:#10b981; --green-d:#059669; --green-l:#d1faf0;  /* đúng / nến tăng */
    --red:#fb5a4b; --red-d:#e03e33; --red-l:#ffe3e0;        /* sai / nến giảm */
    --coral:#ff7a59; --coral-d:#e8623f;                     /* nhấn hành động + streak */
    --gold:#f5a623;                                         /* XP */
    --ink:#0f2a43; --muted:#5b7c93;
    --bg:#f2f9ff; --panel:#e6f4fb; --card:#ffffff; --line:#d2e7f2;
  }
  body.dark{
    /* ====== tối = biển sâu ====== */
    --blue:#38bdf8; --blue-d:#0ea5e9;
    --green:#34d399; --green-d:#10b981; --green-l:#0f3d34;
    --red:#f87171; --red-d:#fb5a4b; --red-l:#3d1f1f;
    --coral:#ff8a65; --coral-d:#ff7a59;
    --gold:#fbbf24;
    --ink:#e6f1fa; --muted:#93b0c7;
    --bg:#0b1e3b; --panel:#122a4d; --card:#0f2545; --line:#1f3a5f;
  }
  /* vài mảng nền sáng đặc biệt cần dịu lại khi ở biển sâu */
  body.dark .takeaway{ background:#2a2410; border-color:#5c4a14; color:#f0d9a0; }
  body.dark .takeaway b{ color:#ffe3a3; }
  body.dark .stat-box.gold{ background:#241f10; }
  body.dark .stat-box.blue{ background:#0e2a45; }
  body.dark .node.locked .circle{ background:#1f3a5f; color:#6f8aa3; box-shadow:0 5px 0 #16304f; }
  body.dark .choice.sel{ background:#0e2f4a; }
  body, .topbar, .chart-card, .choice, .feedback, .slider-box, .context-card, .intro-text{
    transition:background-color .25s ease, color .2s ease, border-color .25s ease;
  }
  .theme-btn{ background:none; border:none; font-size:20px; cursor:pointer; padding:2px 6px; line-height:1; }
  .whale-home{ display:block; width:100%; height:128px; }
  .whale-result{ display:block; width:170px; height:130px; margin:0 auto 4px; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    color:var(--ink); background:var(--bg);
    display:flex; flex-direction:column; align-items:center;
    overflow-x:hidden;
  }
  .app{width:100%; max-width:480px; min-height:100vh; display:flex; flex-direction:column;}

  /* ---- Top bar ---- */
  .topbar{
    display:flex; align-items:center; gap:14px;
    padding:14px 16px; border-bottom:2px solid var(--line);
    position:sticky; top:0; background:var(--card); z-index:5;
  }
  .stat{display:flex; align-items:center; gap:5px; font-weight:800; font-size:18px;}
  .stat.fire{color:var(--coral);} .stat.heart{color:var(--red);} .stat.xp{color:var(--gold);}
  .stat .ic{font-size:20px;}
  .spacer{flex:1;}

  /* ---- Screens ---- */
  .screen{flex:1; display:none; flex-direction:column;}
  .screen.active{display:flex;}

  /* ---- Home / path ---- */
  .home{padding:20px 16px 40px;}
  .hero{
    background:linear-gradient(135deg,#0ea5e9,#14b8a6);
    color:#fff; border-radius:18px; padding:18px 20px 8px; margin-bottom:8px;
  }
  .hero h1{margin:0 0 4px; font-size:22px;}
  .hero p{margin:0; opacity:.92; font-size:14px; line-height:1.4;}
  .path{display:flex; flex-direction:column; align-items:center; gap:6px; margin-top:18px;}
  .node{
    display:flex; flex-direction:column; align-items:center; gap:6px;
    position:relative;
  }
  .node .circle{
    width:74px; height:74px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:32px; border:none; cursor:pointer;
    box-shadow:0 5px 0 rgba(0,0,0,.18);
    transition:transform .08s;
  }
  .node .circle:active{transform:translateY(3px); box-shadow:0 2px 0 rgba(0,0,0,.18);}
  .node.locked .circle{background:#e0e0e0; color:#9a9a9a; box-shadow:0 5px 0 #c8c8c8; cursor:not-allowed;}
  .node.done .circle{background:var(--gold); color:#fff; box-shadow:0 5px 0 #d9a800;}
  .node.active .circle{background:var(--green); color:#fff; box-shadow:0 5px 0 var(--green-d);}
  .node .label{font-size:13px; font-weight:700; text-align:center; max-width:160px;}
  .node .sub{font-size:11px; color:var(--muted); margin-top:-4px;}
  .node.active .label{color:var(--green-d);}
  .connector{width:4px; height:22px; background:var(--line); border-radius:2px;}
  .start-badge{
    position:absolute; top:-14px; right:-6px;
    background:var(--card); color:var(--green-d); border:2px solid var(--green);
    font-size:10px; font-weight:800; padding:2px 7px; border-radius:10px;
    animation:bob 1s ease-in-out infinite;
  }
  @keyframes bob{0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)}}

  /* ---- Lesson ---- */
  .lesson{padding:0; position:relative;}
  .progress-wrap{display:flex; align-items:center; gap:12px; padding:14px 16px;}
  .progress-wrap .close{font-size:24px; color:#afafaf; cursor:pointer; font-weight:700; line-height:1;}
  .bar{flex:1; height:14px; background:var(--line); border-radius:8px; overflow:hidden;}
  .bar > i{display:block; height:100%; width:0%; background:var(--green); border-radius:8px; transition:width .3s;}
  .lesson-body{flex:1; padding:6px 16px 16px; display:flex; flex-direction:column;}
  .prompt{font-size:21px; font-weight:800; margin:8px 0 4px; line-height:1.3; display:flex; align-items:center;}
  .hint{font-size:13px; color:var(--muted); margin-bottom:12px;}
  .chart-card{
    border:2px solid var(--line); border-radius:16px; overflow:hidden;
    background:var(--card); touch-action:manipulation;
  }
  canvas{display:block; width:100%; height:300px;}
  .choices{display:flex; flex-direction:column; gap:10px; margin-top:16px;}
  .choice{
    border:2px solid var(--line); border-bottom-width:4px; border-radius:14px;
    padding:14px 16px; font-size:16px; font-weight:700; background:var(--card); color:var(--ink);
    cursor:pointer; text-align:left; transition:background .1s;
  }
  .choice:active{background:var(--panel);}
  .choice.sel{border-color:var(--blue); background:#ddf4ff; color:var(--blue-d);}
  .choice.ok{border-color:var(--green); background:var(--green-l); color:var(--green-d);}
  .choice.bad{border-color:var(--red); background:var(--red-l); color:var(--red-d);}
  .replay-controls{display:flex; justify-content:center; margin-bottom:4px;}
  .replay-btn{background:var(--panel); color:var(--blue-d); border:2px solid var(--blue); border-radius:12px;
    padding:8px 16px; font-weight:800; cursor:pointer; font-size:14px;}
  .live-dot{display:inline-block; width:10px; height:10px; border-radius:50%; background:var(--red);
    margin-right:8px; animation:blink 1s infinite;}
  @keyframes blink{50%{opacity:.2}}
  /* slider exercise */
  .slider-box{margin-top:8px; border:2px solid var(--line); border-radius:16px; padding:20px 18px; background:var(--card);}
  .slider-read{font-size:16px; text-align:center; margin-bottom:18px; line-height:1.7; min-height:52px;}
  .slider-read b{font-size:19px;}
  input[type=range].slider{width:100%; -webkit-appearance:none; appearance:none; height:12px; border-radius:7px;
    background:linear-gradient(90deg,#d7ffb8,#e5e5e5); outline:none; cursor:pointer;}
  input[type=range].slider::-webkit-slider-thumb{-webkit-appearance:none; appearance:none; width:32px; height:32px;
    border-radius:50%; background:var(--blue); border:3px solid #fff; box-shadow:0 2px 6px rgba(0,0,0,.3); cursor:pointer;}
  input[type=range].slider::-moz-range-thumb{width:32px; height:32px; border:3px solid #fff; border-radius:50%;
    background:var(--blue); box-shadow:0 2px 6px rgba(0,0,0,.3); cursor:pointer;}
  .slider-ends{display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-top:10px; font-weight:700;}
  /* decision exercise */
  .context-card{border:2px solid var(--blue); background:var(--panel); border-radius:14px; padding:13px 15px;
    margin-bottom:12px; font-size:14px; line-height:1.8; font-weight:600; color:var(--ink);}
  .context-card b{color:var(--blue-d);}
  .dist{margin-top:12px; padding-top:12px; border-top:1px dashed var(--muted);}
  .dist-label{font-size:12.5px; color:var(--muted); margin-bottom:6px; font-weight:700;}
  .dist-bar{display:flex; height:28px; border-radius:8px; overflow:hidden; font-size:12px; font-weight:800; color:#fff;}
  .dist-bar .win{background:var(--green); display:flex; align-items:center; justify-content:center; min-width:30px;}
  .dist-bar .loss{background:var(--red); display:flex; align-items:center; justify-content:center; min-width:30px;}
  .dist-outcome{margin-top:10px; font-size:13px; font-weight:700; padding:9px 11px; border-radius:10px; line-height:1.5;}
  .dist-outcome.win{background:var(--green-l); color:var(--green-d);}
  .dist-outcome.loss{background:var(--red-l); color:var(--red-d);}
  /* intro (màn dạy thuần) */
  .intro-text{font-size:15px; line-height:1.75; color:var(--ink); background:var(--panel); border-radius:14px; padding:16px; margin-top:6px;}
  .intro-text b{color:var(--ink);}
  /* Điểm Tư Duy — phần thưởng bắn theo QUY TRÌNH, không theo lãi/lỗ */
  .mind-pill{margin-top:10px; background:#efe6ff; border:2px solid #ce82ff; color:#7b2fd6;
    border-radius:10px; padding:9px 11px; font-size:13px; font-weight:800; text-align:center;}
  .demo-cta{display:block; width:100%; margin-top:12px; border:none; border-radius:16px;
    padding:15px; font-size:15px; font-weight:800; color:#fff; cursor:pointer;
    background:linear-gradient(135deg,#ff7a59,#e8623f); box-shadow:0 4px 0 #c44f30; text-align:center;}
  .demo-cta:active{transform:translateY(2px); box-shadow:0 2px 0 #c44f30;}
  .demo-cta small{display:block; font-weight:600; opacity:.9; font-size:12px; margin-top:2px;}

  /* ---- Feedback bar ---- */
  .feedback{
    position:sticky; bottom:0; padding:16px;
    border-top:2px solid var(--line); background:var(--card);
  }
  .feedback.good{background:var(--green-l); border-color:var(--green);}
  .feedback.bad{background:var(--red-l); border-color:var(--red);}
  .feedback.show{animation:slideup .25s ease-out;}
  @keyframes slideup{from{transform:translateY(100%); opacity:.3} to{transform:translateY(0); opacity:1}}
  .fb-title{font-weight:800; font-size:17px; display:flex; align-items:center; gap:8px;}
  .feedback.good .fb-title{color:var(--green-d);}
  .feedback.bad .fb-title{color:var(--red-d);}
  .fb-text{font-size:13.5px; color:var(--muted); margin:6px 0 0; line-height:1.45;}
  .btn{
    display:block; width:100%; border:none; border-radius:14px;
    padding:15px; font-size:16px; font-weight:800; color:#fff;
    cursor:pointer; box-shadow:0 4px 0 rgba(0,0,0,.18); transition:transform .06s;
  }
  .btn:active{transform:translateY(2px); box-shadow:0 2px 0 rgba(0,0,0,.18);}
  .btn:disabled{opacity:.4; cursor:default; box-shadow:none;}
  .btn.green{background:var(--green);} .btn.greenD{box-shadow:0 4px 0 var(--green-d);}
  .btn.gray{background:#e5e5e5; color:#afafaf; box-shadow:0 4px 0 #cfcfcf;}
  .btn.blue{background:var(--blue); box-shadow:0 4px 0 #1380d8;}
  .check-row{margin-top:10px;}

  /* ---- Animations ---- */
  @keyframes shake{0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(7px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)}}
  .shake{animation:shake .42s;}
  .confetti{position:fixed; top:-12px; width:10px; height:14px; z-index:60; border-radius:2px; pointer-events:none;}
  @keyframes fall{to{transform:translateY(112vh) rotate(560deg); opacity:.85}}

  /* ---- Result ---- */
  .result{padding:30px 20px; align-items:center; justify-content:center; text-align:center; flex:1; display:none; flex-direction:column;}
  .result.active{display:flex;}
  .result .emoji{font-size:64px; margin-bottom:8px;}
  .result h2{margin:0 0 6px; font-size:26px;}
  .result p{color:var(--muted); margin:0 0 22px;}
  .stats{display:flex; gap:12px; width:100%; margin-bottom:26px; max-width:340px;}
  .stat-box{flex:1; border:2px solid var(--line); border-radius:14px; padding:14px 8px;}
  .stat-box.gold{border-color:var(--gold); background:#fff9e6;}
  .stat-box.blue{border-color:var(--blue); background:#eaf7ff;}
  .stat-box .num{font-size:24px; font-weight:900;}
  .stat-box.gold .num{color:#e0a800;} .stat-box.blue .num{color:#1380d8;}
  .stat-box .cap{font-size:11px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.5px;}
  .takeaway{
    background:#fff8e6; border:2px solid #ffe9a8; border-radius:14px;
    padding:14px; font-size:13.5px; text-align:left; color:#7a5b00; margin-bottom:24px; line-height:1.5; max-width:340px;
  }
  .takeaway b{color:#5c4400;}
</style>
</head>
<body>
<div class="app">

  <!-- Top bar -->
  <div class="topbar">
    <div class="stat fire"><span class="ic">🔥</span><span id="t-streak">0</span></div>
    <div class="stat xp"><span class="ic">⚡</span><span id="t-xp">0</span></div>
    <div class="spacer"></div>
    <button id="themeBtn" class="theme-btn" onclick="toggleTheme()" title="Chế độ sáng/tối">🌙</button>
    <div class="stat heart"><span class="ic">❤️</span><span id="t-hearts">5</span></div>
  </div>

  <!-- HOME -->
  <div class="screen active" id="home">
    <div class="home">
      <div class="hero">
        <canvas id="whaleHome" class="whale-home"></canvas>
        <h1>Pipu 🐳</h1>
        <p>Học trade từ con số 0 cùng cá voi Pipu — chạm, kéo, quyết định. Mỗi ngày 5 phút.</p>
      </div>
      <button class="demo-cta" onclick="startDemoLesson()">⭐ Thử bài mới: Vào lệnh thật
        <small>Quyết định → xem thị trường chạy thật → kiếm 🧠 Điểm Tư Duy</small></button>
      <div class="path" id="path"></div>
    </div>
  </div>

  <!-- LESSON -->
  <div class="screen" id="lesson">
    <div class="lesson">
      <div class="progress-wrap">
        <span class="close" onclick="quitLesson()">✕</span>
        <div class="bar"><i id="prog"></i></div>
      </div>
      <div class="lesson-body">
        <div class="prompt" id="prompt"></div>
        <div class="hint" id="hint"></div>
        <div class="chart-card" id="chartCard" style="display:none">
          <canvas id="cv"></canvas>
        </div>
        <div class="choices" id="choices"></div>
      </div>
    </div>
    <div class="feedback" id="feedback" style="display:none">
      <div class="fb-title" id="fbTitle"></div>
      <div class="fb-text" id="fbText"></div>
      <div class="check-row"><button class="btn green greenD" id="contBtn" onclick="nextExercise()">Tiếp tục</button></div>
    </div>
    <div class="feedback" id="checkBar">
      <button class="btn gray" id="checkBtn" disabled onclick="checkAnswer()">Kiểm tra</button>
    </div>
  </div>

  <!-- RESULT -->
  <div class="result" id="result">
    <canvas id="whaleResult" class="whale-result"></canvas>
    <h2 id="r-title">Hoàn thành bài học!</h2>
    <p id="r-sub">Bạn vừa đọc được biểu đồ nến đầu tiên.</p>
    <div class="stats">
      <div class="stat-box gold"><div class="num" id="r-xp">0</div><div class="cap">⚡ XP</div></div>
      <div class="stat-box blue"><div class="num" id="r-acc">0%</div><div class="cap">🎯 Chính xác</div></div>
    </div>
    <div class="takeaway" id="r-take"></div>
    <button class="btn green greenD" onclick="goHome()" style="max-width:320px">Về trang chủ</button>
  </div>

</div>

<script>
/* ========================================================================
   Pipu — prototype web. Tự chứa, không thư viện ngoài.
   Data nến = random-walk sinh tại chỗ (sau ghép data Bybit thật).
   ===================================================================== */

const STATE = { hearts:5, xp:0, streak:0, lastPlayed:null, mind:0 };

const UNITS = [
  {id:0, icon:"🧠", label:"Kỳ vọng thật",        sub:"Bắt đầu ở đây",     status:"active"},
  {id:1, icon:"🕯️", label:"Đọc biểu đồ nến",     sub:"Đọc nến cơ bản",    status:"locked"},
  {id:2, icon:"📐", label:"Cấu trúc thị trường", sub:"Trend, hỗ trợ/kháng cự", status:"locked"},
  {id:3, icon:"🛡️", label:"Quản lý rủi ro",      sub:"Size lệnh, stop, R", status:"locked"},
  {id:4, icon:"🎯", label:"Setup đầu tiên",      sub:"Vào lệnh có hệ thống", status:"locked"},
  {id:5, icon:"😤", label:"Tâm lý thực chiến",   sub:"FOMO, gỡ gạc",      status:"locked"},
  {id:6, icon:"📓", label:"Nhật ký & tự sửa",    sub:"Tiến bộ mỗi ngày",  status:"locked"},
];

/* ---------- Lưu / nạp tiến độ (localStorage) ----------
   localStorage chỉ chứa text → mình JSON hoá y như json.dumps/loads bên Python. */
function saveState(){
  try{
    localStorage.setItem('tradezero', JSON.stringify({
      xp:STATE.xp, streak:STATE.streak, lastPlayed:STATE.lastPlayed, mind:STATE.mind,
      units:UNITS.map(u=>u.status)
    }));
  }catch(e){}
}
function loadState(){
  try{
    const raw = localStorage.getItem('tradezero');
    if(!raw) return;
    const s = JSON.parse(raw);
    if(typeof s.xp==='number') STATE.xp = s.xp;
    if(typeof s.streak==='number') STATE.streak = s.streak;
    if(typeof s.mind==='number') STATE.mind = s.mind;
    STATE.lastPlayed = s.lastPlayed || null;
    if(Array.isArray(s.units)) s.units.forEach((st,i)=>{ if(UNITS[i]) UNITS[i].status = st; });
  }catch(e){}
}
function today(){ return new Date().toISOString().slice(0,10); } // 'YYYY-MM-DD'

/* ---------- Âm thanh (WebAudio, không file ngoài) ---------- */
let AC=null;
function audio(){ try{ if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended') AC.resume(); }catch(e){} return AC; }
function tone(freq,start,dur,type='sine',vol=0.2){
  const a=audio(); if(!a) return;
  const o=a.createOscillator(), g=a.createGain();
  o.type=type; o.frequency.value=freq;
  const t=a.currentTime+start;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.linearRampToValueAtTime(vol,t+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+dur+0.03);
}
function sndCorrect(){ tone(660,0,0.12,'triangle',0.25); tone(990,0.1,0.2,'triangle',0.25); }
function sndWrong(){ tone(196,0,0.2,'sawtooth',0.16); tone(146,0.13,0.24,'sawtooth',0.15); }
function sndTap(){ tone(540,0,0.05,'square',0.09); }
function sndTick(){ tone(440,0,0.04,'sine',0.05); }
function sndFinish(){ [523,659,784,1047].forEach((f,i)=>tone(f,i*0.13,0.28,'triangle',0.24)); }
function confetti(){
  const colors=['#58cc02','#1cb0f6','#ffc800','#ff4b4b','#ce82ff'];
  for(let i=0;i<72;i++){
    const d=document.createElement('div'); d.className='confetti';
    d.style.left=Math.random()*100+'vw';
    d.style.background=colors[i%colors.length];
    d.style.animation=`fall ${1+Math.random()*1.2}s ${Math.random()*0.4}s ease-in forwards`;
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),2700);
  }
}

/* ---------- Theme: sáng = mặt biển / tối = biển sâu ---------- */
function cssVar(name){ return getComputedStyle(document.body).getPropertyValue(name).trim() || '#0f2a43'; }
function applyTheme(t){
  document.body.classList.toggle('dark', t==='dark');
  const b=document.getElementById('themeBtn'); if(b) b.textContent = (t==='dark')?'☀️':'🌙';
  try{ localStorage.setItem('pipu_theme', t); }catch(e){}
}
function toggleTheme(){
  applyTheme(document.body.classList.contains('dark')?'light':'dark');
  redrawAll();
}
function initTheme(){
  let t=null; try{ t=localStorage.getItem('pipu_theme'); }catch(e){}
  if(!t) t=(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';
  applyTheme(t);
}

/* ---------- Linh vật: cá voi PIPU (vẽ thuần canvas, không file ngoài) ----------
   mood: 'happy' (cười + phun nước) | 'sad' (xịu). Màu thân ăn theo theme. */
function drawWhale(x, cx, cy, s, mood, t){
  t = t||0;
  const body  = cssVar('--blue') || '#0ea5e9';
  const belly = document.body.classList.contains('dark') ? '#9fd6f5' : '#d6eefc';
  const happy = mood!=='sad';
  cy += Math.sin(t*2.2)*s*0.07;            // nhấp nhô như đang "thở"
  const tw = Math.sin(t*2.2+0.7)*s*0.12;   // đuôi vẫy
  x.save();
  if(happy){ // bong bóng nổi lên
    for(let k=0;k<3;k++){
      const bt=(t*0.45+k*0.34)%1, by=cy-s*0.85-bt*s*1.05;
      const bx=cx-s*0.55+Math.sin(bt*6+k)*s*0.06, br=Math.max(1,s*0.07*(1-bt*0.4));
      x.globalAlpha=0.55*(1-bt); x.fillStyle=body;
      x.beginPath(); x.arc(bx,by,br,0,Math.PI*2); x.fill();
    }
    x.globalAlpha=1;
  }
  x.fillStyle=body;                                   // đuôi (vẫy theo tw)
  x.beginPath();
  x.moveTo(cx+s*0.95, cy);
  x.quadraticCurveTo(cx+s*1.50, cy-s*0.62+tw, cx+s*1.72, cy-s*0.22+tw);
  x.quadraticCurveTo(cx+s*1.46, cy,           cx+s*1.72, cy+s*0.22+tw);
  x.quadraticCurveTo(cx+s*1.50, cy+s*0.62+tw, cx+s*0.95, cy);
  x.fill();
  x.beginPath(); x.ellipse(cx, cy, s*1.15, s*0.9, 0, 0, Math.PI*2); x.fill();   // thân
  x.fillStyle=belly;                                  // bụng
  x.beginPath(); x.ellipse(cx-s*0.12, cy+s*0.32, s*0.82, s*0.5, 0, 0, Math.PI*2); x.fill();
  x.fillStyle=body;                                   // vây
  x.beginPath(); x.ellipse(cx-s*0.05, cy+s*0.62, s*0.34, s*0.16, -0.5, 0, Math.PI*2); x.fill();
  // mắt + chớp mắt định kỳ
  const blink = happy && ((t%3.6)<0.14);
  x.strokeStyle='#0f2a43'; x.fillStyle='#0f2a43'; x.lineCap='round';
  if(blink){ x.lineWidth=Math.max(1.5,s*0.05); x.beginPath();
    x.moveTo(cx-s*0.62, cy-s*0.12); x.lineTo(cx-s*0.38, cy-s*0.12); x.stroke(); }
  else { x.beginPath(); x.arc(cx-s*0.5, cy-s*0.12, s*0.12, 0, Math.PI*2); x.fill();
    x.fillStyle='#fff'; x.beginPath(); x.arc(cx-s*0.54, cy-s*0.16, s*0.045, 0, Math.PI*2); x.fill(); }
  // miệng
  x.strokeStyle='#0f2a43'; x.lineWidth=Math.max(1.5,s*0.045); x.beginPath();
  if(mood==='sad') x.arc(cx-s*0.25, cy+s*0.5, s*0.26, Math.PI*1.18, Math.PI*1.82);   // xịu
  else             x.arc(cx-s*0.25, cy+s*0.12, s*0.30, 0.12*Math.PI, 0.88*Math.PI);  // cười
  x.stroke();
  x.restore();
}
function drawWhaleInto(canvasId, mood, t){
  const cv=document.getElementById(canvasId); if(!cv) return;
  const W=cv.clientWidth||280, H=cv.clientHeight||128, dpr=window.devicePixelRatio||1;
  if(cv.width!==Math.round(W*dpr)||cv.height!==Math.round(H*dpr)){ cv.width=W*dpr; cv.height=H*dpr; }
  const x=cv.getContext('2d'); x.setTransform(1,0,0,1,0,0); x.scale(dpr,dpr); x.clearRect(0,0,W,H);
  drawWhale(x, W*0.46, H*0.60, Math.min(W*0.22, H*0.34), mood, t||0);
}
/* Vòng lặp animation — chỉ chạy khi đang ở màn CÓ cá voi (đỡ tốn pin). */
let WHALE_RAF=null, _whaleT0=0;
function whaleLoop(ts){
  if(!_whaleT0) _whaleT0=ts;
  const t=(ts-_whaleT0)/1000;
  if(document.getElementById('home').classList.contains('active')) drawWhaleInto('whaleHome','happy',t);
  else if(document.getElementById('result').classList.contains('active')) drawWhaleInto('whaleResult', resultMood(), t);
  else { WHALE_RAF=null; return; }
  WHALE_RAF=requestAnimationFrame(whaleLoop);
}

/* ---------- Sinh data nến ---------- */
function genCandles(n, trend, vol){
  let price = 100 + Math.random()*20;
  const out = [];
  for(let i=0;i<n;i++){
    const open = price;
    const drift = trend * vol * 0.5;
    const noise = (Math.random()-0.5) * vol * 2;
    let close = open + drift + noise;
    if(close<1) close = 1;
    const hi = Math.max(open,close) + Math.random()*vol*0.9;
    const lo = Math.min(open,close) - Math.random()*vol*0.9;
    out.push({o:open,h:hi,l:lo,c:close});
    price = close;
  }
  return out;
}
function ensureMixed(c){
  const up = c.findIndex(k=>k.c>k.o), dn = c.findIndex(k=>k.c<k.o);
  if(up<0){ c[0].c = c[0].o + Math.abs(c[0].h-c[0].o) + 1; }
  if(dn<0){ c[1].c = c[1].o - Math.abs(c[1].o-c[1].l) - 1; }
  return c;
}

/* ---------- Vẽ nến lên canvas ---------- */
let CV, CTX, LAYOUT=[];
function drawChart(candles, highlightSet, correctSet){
  CV = document.getElementById('cv');
  const card = document.getElementById('chartCard');
  const cssW = card.clientWidth, cssH = 300;
  const dpr = window.devicePixelRatio || 1;
  CV.width = cssW*dpr; CV.height = cssH*dpr;
  CV.style.height = cssH+'px';
  CTX = CV.getContext('2d'); CTX.setTransform(1,0,0,1,0,0); CTX.scale(dpr,dpr);
  CTX.clearRect(0,0,cssW,cssH);

  const padX=16, padTop=18, padBot=18;
  const w = cssW-padX*2, h = cssH-padTop-padBot;
  let hi=-1e9, lo=1e9;
  candles.forEach(k=>{hi=Math.max(hi,k.h); lo=Math.min(lo,k.l);});
  const range = (hi-lo)||1;
  const Y = v => padTop + (hi - v)/range * h;

  const n = candles.length;
  const slot = w/n;
  const bodyW = Math.min(slot*0.62, 22);
  LAYOUT = [];

  candles.forEach((k,i)=>{
    const cx = padX + slot*i + slot/2;
    LAYOUT.push({x0:padX+slot*i, x1:padX+slot*(i+1), cx});
    const green = k.c>=k.o;
    const col = green? '#58cc02' : '#ff4b4b';
    if(correctSet && correctSet.has(i)){ // nến đáp án đúng — tô XANH khi user chọn sai
      CTX.fillStyle = 'rgba(88,204,2,.22)';
      CTX.fillRect(padX+slot*i, padTop-6, slot, h+12);
    }
    if(highlightSet && highlightSet.has(i)){
      CTX.fillStyle = 'rgba(28,176,246,.16)';
      CTX.fillRect(padX+slot*i, padTop-6, slot, h+12);
    }
    CTX.strokeStyle = col; CTX.lineWidth = 2;
    CTX.beginPath(); CTX.moveTo(cx, Y(k.h)); CTX.lineTo(cx, Y(k.l)); CTX.stroke();
    const yo=Y(k.o), yc=Y(k.c);
    const top=Math.min(yo,yc), bh=Math.max(Math.abs(yc-yo),2);
    CTX.fillStyle = col;
    CTX.fillRect(cx-bodyW/2, top, bodyW, bh);
  });
}
function candleAt(clientX){
  const r = CV.getBoundingClientRect();
  const x = clientX - r.left;
  for(let i=0;i<LAYOUT.length;i++){
    if(x>=LAYOUT[i].x0 && x<LAYOUT[i].x1) return i;
  }
  return -1;
}

/* ---------- Vẽ hình minh hoạ cho bài intro (giải phẫu cây nến) ---------- */
function drawIntroIllus(kind){
  CV = document.getElementById('cv');
  const card = document.getElementById('chartCard');
  const W = card.clientWidth, H = 300, dpr = window.devicePixelRatio||1;
  CV.width = W*dpr; CV.height = H*dpr; CV.style.height = H+'px';
  CTX = CV.getContext('2d'); CTX.setTransform(1,0,0,1,0,0); CTX.scale(dpr,dpr);
  CTX.clearRect(0,0,W,H); CTX.textBaseline='middle';

  const candle=(cx,bw,yHigh,yTop,yBot,yLow,green)=>{
    const col = green?'#58cc02':'#ff4b4b';
    CTX.strokeStyle=col; CTX.lineWidth=4;
    CTX.beginPath(); CTX.moveTo(cx,yHigh); CTX.lineTo(cx,yLow); CTX.stroke();
    CTX.fillStyle=col; CTX.fillRect(cx-bw/2,yTop,bw,yBot-yTop);
  };
  const dash=(x1,y,x2)=>{ CTX.strokeStyle='#cfcfcf'; CTX.lineWidth=1.5;
    CTX.beginPath(); CTX.moveTo(x1,y); CTX.lineTo(x2,y); CTX.stroke(); };

  if(kind==='anatomy'){
    const cx=W*0.5, bw=46, yHigh=36, yTop=92, yBot=210, yLow=266;
    candle(cx,bw,yHigh,yTop,yBot,yLow,true);
    CTX.font='bold 13px -apple-system,Segoe UI,Arial'; CTX.fillStyle=cssVar('--ink'); CTX.textAlign='right';
    [['Cao nhất',yHigh,cx],['Giá đóng',yTop,cx-bw/2],['Giá mở',yBot,cx-bw/2],['Thấp nhất',yLow,cx]]
      .forEach(([t,y,xt])=>{ dash(116,y,xt); CTX.fillText(t,110,y); });
    CTX.textAlign='left'; CTX.fillStyle=cssVar('--muted');
    dash(cx+bw/2,(yTop+yBot)/2,W-116); CTX.fillText('Thân nến',W-112,(yTop+yBot)/2);
    dash(cx,(yHigh+yTop)/2,W-116);      CTX.fillText('Bấc (râu)',W-112,(yHigh+yTop)/2);
  } else if(kind==='greenred'){
    const bw=42, cxG=W*0.3, cxR=W*0.7;
    candle(cxG,bw,46,86,206,250,true);
    candle(cxR,bw,46,86,206,250,false);
    CTX.textAlign='center'; CTX.font='12px -apple-system,Segoe UI,Arial'; CTX.fillStyle=cssVar('--muted');
    CTX.fillText('đóng > mở',cxG,28); CTX.fillText('đóng < mở',cxR,28);
    CTX.font='bold 15px -apple-system,Segoe UI,Arial';
    CTX.fillStyle='#46a302'; CTX.fillText('XANH = TĂNG',cxG,275);
    CTX.fillStyle='#d63b3b'; CTX.fillText('ĐỎ = GIẢM',cxR,275);
  }
  CTX.textAlign='left';
}

/* ---------- Định nghĩa bài học Unit 1 ---------- */
function buildUnit1(){

  // 0a. INTRO: cây nến là gì (giải phẫu)

    prompt:'Cây nến là gì? 🕯️',

  // 2. tap nến đỏ

  L.push({type:'tap', candles:c2, prompt:'Chạm vào một nến GIẢM (đỏ)',

  // 3. đỉnh cao nhất

  // 5. thân dài nhất

  // 8. bấc dưới dài nhất

  // 9. replay nến chạy

  return L;
}

/* ---------- Sinh nến từ chuỗi điểm xoay (pivot) ----------
   Cho trước các mốc giá (vd 100→114→106...), đổ nến vào giữa từng đoạn.
   Nhờ biết trước mốc nên xác định ĐỈNH/ĐÁY (swing high/low) chính xác 100%. */
function fromPivots(pivots, perLeg){
  const candles=[], swingHigh=[], swingLow=[];
  for(let p=0;p<pivots.length-1;p++){
    const from=pivots[p], to=pivots[p+1];
    const up = to>from, span=Math.abs(to-from)||1;
    for(let s=1;s<=perLeg;s++){
      const o=from+(to-from)*((s-1)/perLeg);
      const c=from+(to-from)*(s/perLeg) + (Math.random()-0.5)*span*0.10;
      const hi=Math.max(o,c)+Math.random()*span*0.10;
      const lo=Math.min(o,c)-Math.random()*span*0.10;
      candles.push({o,h:hi,l:lo,c});
    }
    (up?swingHigh:swingLow).push(candles.length-1); // nến cuối mỗi đoạn = đỉnh/đáy
  }
  return {candles, swingHigh, swingLow};
}

let LESSON=[], idx=0, picked=null, answered=false, correctCount=0, totalAnswered=0;
let REPLAY_TIMER=null;

function renderPath(){
  const p = document.getElementById('path'); p.innerHTML='';
  UNITS.forEach((u,i)=>{
    if(i>0){ const c=document.createElement('div'); c.className='connector'; p.appendChild(c); }
    const node=document.createElement('div'); node.className='node '+u.status;
    const badge = u.status==='active' ? '<div class="start-badge">BẮT ĐẦU</div>' : '';
    const icon = u.status==='locked' ? '🔒' : (u.status==='done' ? '✓' : u.icon);
    node.innerHTML = `<button class="circle">${icon}</button>${badge}
       <div class="label">Unit ${u.id}: ${u.label}</div><div class="sub">${u.sub}</div>`;
    node.querySelector('.circle').onclick = ()=>{
      if(u.status==='active' || u.status==='done') startLesson(u.id);
      else if(u.status==='locked') flashLocked(node);
    };
    p.appendChild(node);
  });
}
function flashLocked(node){
  const lb=node.querySelector('.label'); const txt=lb.textContent;
  lb.textContent='🔒 Hoàn thành unit trước đã nhé!';
  setTimeout(()=>{ lb.textContent=txt; }, 1400);
}

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('result').classList.remove('active');
  if(id==='result') document.getElementById('result').classList.add('active');
  else document.getElementById(id).classList.add('active');
}

function startLesson(unitId){
  const build = BUILDERS[unitId];
  if(!build){ alert('🚧 Nội dung Unit này đang được xây. Sắp có nhé!'); return; }
  audio();
  CURRENT_UNIT = unitId;
  LESSON = build(); idx=0; correctCount=0; totalAnswered=0;
  STATE.hearts=5; updateTop();
  show('lesson'); renderExercise();
}
function quitLesson(){ if(confirm('Thoát bài học? Tiến độ bài này sẽ mất.')){ clearInterval(REPLAY_TIMER); goHome(); } }
function goHome(){ clearInterval(REPLAY_TIMER); renderPath(); show('home'); startWhaleLoop(); }

function renderExercise(){
  clearInterval(REPLAY_TIMER);
  const ex = LESSON[idx]; picked=null; answered=false;
  document.getElementById('prog').style.width = (idx/LESSON.length*100)+'%';
  document.getElementById('hint').textContent = ex.hint||'';
  const fb=document.getElementById('feedback'); fb.style.display='none'; fb.className='feedback';
  const cbtn=document.getElementById('checkBtn'); cbtn.className='btn gray'; cbtn.disabled=true; cbtn.textContent='Kiểm tra';
  cbtn.onclick = checkAnswer; // reset handler (bài intro sẽ đổi sang nextExercise)
  const cont=document.getElementById('contBtn'); cont.textContent='Tiếp tục'; cont.style.display='block';
  const card=document.getElementById('chartCard');
  const choices=document.getElementById('choices'); choices.innerHTML='';
  document.getElementById('cv').onclick=null; // reset handler tap của bài trước

  if(ex.type==='replay'){ streamReplay(ex); return; }

  if(ex.type==='intro'){
    document.getElementById('prompt').textContent = ex.prompt;
    document.getElementById('hint').textContent = ex.hint || '';
    if(ex.illus){ card.style.display='block'; requestAnimationFrame(()=>drawIntroIllus(ex.illus)); }
    else { card.style.display='none'; }
    const box=document.createElement('div'); box.className='intro-text'; box.innerHTML=ex.body;
    choices.appendChild(box);
    cbtn.disabled=false; cbtn.className='btn green greenD'; cbtn.textContent='Tiếp tục →';
    cbtn.onclick = nextExercise; // intro: bấm là qua bài, không chấm điểm
    document.getElementById('checkBar').style.display='block';
    return;
  }

  document.getElementById('prompt').textContent = ex.prompt;
  document.getElementById('checkBar').style.display='block';

  if(ex.candles){ card.style.display='block'; requestAnimationFrame(()=>drawChart(ex.candles,null)); }
  else card.style.display='none';

  if(ex.type==='tap'){
    CV = document.getElementById('cv');
    CV.onclick = (e)=>{
      if(answered) return;
      const i = candleAt(e.clientX);
      if(i<0) return;
      picked=i; sndTap();
      drawChart(ex.candles, new Set([i]));
      enableCheck();
    };
  } else if(ex.type==='choice'){
    buildChoices(ex);
  } else if(ex.type==='slider'){
    buildSlider(ex);
  } else if(ex.type==='decision'){
    buildDecision(ex);
  } else if(ex.type==='setup'){
    card.style.display='block';
    requestAnimationFrame(()=>drawPlayout(ex.setupCandles, ex.setupCandles.length, ex._lv));
    buildDecision(ex); // dùng lại context-card + lựa chọn của bài decision
  }
}

function buildDecision(ex){
  const wrap=document.getElementById('choices');
  if(ex.context){
    const c=document.createElement('div'); c.className='context-card'; c.innerHTML=ex.context;
    wrap.appendChild(c);
  }
  buildChoices(ex);
}
function decisionReveal(ex){
  const wr=ex.winRate;
  const outcome = ex.forceOutcome || (Math.random()*100<wr ? 'win':'loss');
  const msg = outcome==='win'
    ? 'tốt — nhưng đừng tưởng mình "giỏi" chỉ vì một lần thắng.'
    : 'và quyết định của bạn VẪN đúng. Đây là xác suất, không phải lỗi của bạn. Cứ lặp lại quy trình tốt, lợi thế sẽ tự thắng về dài hạn.';
  return `<div class="dist">
    <div class="dist-label">Cùng setup này nếu lặp lại 100 lần:</div>
    <div class="dist-bar"><span class="win" style="width:${wr}%">${wr} thắng</span><span class="loss" style="width:${100-wr}%">${100-wr} thua</span></div>
    <div class="dist-outcome ${outcome}">🎲 Lần này: <b>${outcome==='win'?'THẮNG ✅':'THUA ❌'}</b> — ${msg}</div>
  </div>`;
}

/* ============================================================
   BÀI DEMO "VÀO LỆNH THẬT" — bản tổng hợp: juice mạnh + chấm TƯ DUY.
   Khác bài decision thường ở chỗ: sau khi quyết định, CHART CHẠY THẬT
   tới mục tiêu/stop, và phần thưởng (🧠 Điểm Tư Duy + confetti) bắn theo
   QUYẾT ĐỊNH ĐÚNG QUY TRÌNH — không theo việc lệnh thắng hay thua.
   ============================================================ */

/* Vẽ chart có vạch Giá vào / Stop / Mục tiêu, thang giá CỐ ĐỊNH để vạch
   đứng yên trong khi nến chạy. shown = số nến đang hiện (để stream). */
function drawPlayout(candles, shown, lv){
  CV = document.getElementById('cv');
  const card = document.getElementById('chartCard');
  const cssW = card.clientWidth, cssH = 300, dpr = window.devicePixelRatio||1;
  CV.width=cssW*dpr; CV.height=cssH*dpr; CV.style.height=cssH+'px';
  CTX=CV.getContext('2d'); CTX.setTransform(1,0,0,1,0,0); CTX.scale(dpr,dpr);
  CTX.clearRect(0,0,cssW,cssH);
  const padX=16, padTop=18, padBot=18;
  const w=cssW-padX*2, h=cssH-padTop-padBot;
  let hi=-1e9, lo=1e9;
  candles.forEach(k=>{hi=Math.max(hi,k.h); lo=Math.min(lo,k.l);});
  [lv.entry,lv.stop,lv.target].forEach(v=>{hi=Math.max(hi,v); lo=Math.min(lo,v);});
  const mar=(hi-lo)*0.08||1; hi+=mar; lo-=mar;
  const range=(hi-lo)||1;
  const Y=v=>padTop+(hi-v)/range*h;
  const n=candles.length, slot=w/n, bodyW=Math.min(slot*0.6,18);

  const hline=(price,col,label)=>{
    const y=Y(price);
    CTX.strokeStyle=col; CTX.lineWidth=1.5; CTX.setLineDash([5,4]);
    CTX.beginPath(); CTX.moveTo(padX,y); CTX.lineTo(padX+w,y); CTX.stroke(); CTX.setLineDash([]);
    CTX.fillStyle=col; CTX.font='bold 11px -apple-system,Segoe UI,Arial';
    CTX.textAlign='left'; CTX.textBaseline='bottom'; CTX.fillText(label, padX+2, y-2);
  };
  hline(lv.target,'#46a302','🎯 Mục tiêu');
  hline(lv.entry,'#1cb0f6','▶ Giá vào');
  hline(lv.stop,'#d63b3b','🛡️ Stop');

  for(let i=0;i<Math.min(shown,n);i++){
    const k=candles[i], cx=padX+slot*i+slot/2;
    const col = k.c>=k.o ? '#58cc02' : '#ff4b4b';
    CTX.strokeStyle=col; CTX.lineWidth=2;
    CTX.beginPath(); CTX.moveTo(cx,Y(k.h)); CTX.lineTo(cx,Y(k.l)); CTX.stroke();
    const yo=Y(k.o), yc=Y(k.c), top=Math.min(yo,yc), bh=Math.max(Math.abs(yc-yo),2);
    CTX.fillStyle=col; CTX.fillRect(cx-bodyW/2, top, bodyW, bh);
  }
  CTX.textBaseline='alphabetic'; CTX.textAlign='left';
}

/* Sau khi đã chấm quyết định: cho nến tương lai chạy lần lượt tới kết cục. */
function playoutSetup(ex){
  clearInterval(REPLAY_TIMER);
  const all = ex.setupCandles.concat(ex.playoutCandles);
  let n = ex.setupCandles.length;
  drawPlayout(all, n, ex._lv);
  REPLAY_TIMER = setInterval(()=>{
    n++; drawPlayout(all, n, ex._lv); sndTick();
    if(n>=all.length){ clearInterval(REPLAY_TIMER); setTimeout(()=>afterPlayout(ex),350); }
  }, 220);
}

/* Chart đã chạy xong → hé lộ kết quả + thông điệp + (nếu đúng quy trình) Điểm Tư Duy. */
function afterPlayout(ex){
  const won = ex.outcome==='win';
  if(won){ tone(660,0,0.12,'triangle',0.2); tone(880,0.1,0.18,'triangle',0.2); }
  else   { tone(240,0,0.28,'sine',0.16); }            // tiếng "thị trường", khác tiếng chấm đúng
  const processOK = (picked===ex.answer);
  document.getElementById('fbText').innerHTML += setupReveal(ex, processOK);
  const cb=document.getElementById('contBtn'); cb.style.display='block';
  cb.textContent = (STATE.hearts<=0) ? 'Hết tim — thử lại'
                 : (idx>=LESSON.length-1 ? 'Xem kết quả' : 'Tiếp tục');
  lockContinue(900);
}

/* Thông điệp tách bạch: KẾT QUẢ lệnh (thị trường) vs QUYẾT ĐỊNH (của bạn). */
function setupReveal(ex, processOK){
  const wr=ex.winRate, won=ex.outcome==='win';
  let head, msg, outClass;
  if(ex.kind==='enter'){
    if(won){ head='Lệnh THẮNG ✅'; outClass='win';
      msg='Nhưng nhớ: một lần thắng <b>không</b> chứng minh bạn giỏi — quy trình mới là thứ đáng tin.'; }
    else { head='Lệnh THUA ❌'; outClass='loss';
      msg='Nhưng <b>quyết định của bạn HOÀN HẢO</b>. Thua ở đây là xác suất, không phải lỗi của bạn. '+
          'Đây chính là linh hồn Pipu: chấm <b>TƯ DUY</b>, không chấm kết quả.'; }
  } else { // kind === 'skip': hiện điều gì sẽ xảy ra NẾU vào
    if(won){ head='Nếu vào thì lần này THẮNG 🤏'; outClass='loss';
      msg='May thôi — setup xấu (đu đỉnh, R:R kém), kiểu vào này về dài hạn là thua. Đừng để 1 lần may dạy hư bạn.'; }
    else { head='Nếu vào, bạn đã THUA ✅'; outClass='win';
      msg='Bạn đã kiên nhẫn ĐỢI/BỎ → <b>tránh được cú thua này</b>. Không vào lệnh cũng là một quyết định giỏi.'; }
  }
  const pill = processOK ? '<div class="mind-pill">🧠 +1 Điểm Tư Duy — cho quyết định đúng quy trình</div>' : '';
  return `<div class="dist">
    <div class="dist-label">Cùng setup này lặp lại 100 lần:</div>
    <div class="dist-bar"><span class="win" style="width:${wr}%">${wr} thắng</span><span class="loss" style="width:${100-wr}%">${100-wr} thua</span></div>
    <div class="dist-outcome ${outClass}">🎲 ${head}<br>${msg}</div>
    ${pill}
  </div>`;
}

/* Tạo 1 setup: nến trước quyết định + nến playout + 3 mức giá. */
function makeSetup(o){
  const cs = fromPivots(o.setupPivots, 3).candles;
  const entry = cs[cs.length-1].c;
  const stop  = entry*(1 - o.stopPct);
  const target= entry*(1 + o.stopPct*o.rr);
  const end   = (o.outcome==='win') ? target : stop;
  const po = fromPivots([entry, entry+(end-entry)*0.45, entry+(end-entry)*0.75, end], 2).candles;
  return {setupCandles:cs, playoutCandles:po, entry, stop, target,
          _lv:{entry,stop,target}, outcome:o.outcome};
}

function buildDemoSetup(){
  const L=[];

  L.push({type:'intro', prompt:'Vào lệnh thật 🎯',
    body:'Bài này khác: bạn quyết định, rồi <b>xem thị trường chạy thật</b> tới mục tiêu hoặc stop.<br><br>'+
      'Nhưng nhớ kỹ — Pipu <b>chấm TƯ DUY của bạn</b>, không chấm việc lệnh thắng hay thua. '+
      'Mỗi quyết định đúng quy trình = <b>+1 🧠 Điểm Tư Duy</b>, dù kết quả thế nào.<br><br>Bắt đầu nhé 👇'});

    context:'🔼 Xu hướng: <b>TĂNG</b> (đỉnh đáy cao dần)<br>📍 Giá vừa về <b>HỖ TRỢ</b><br>🛡️ Stop rõ ngay dưới hỗ trợ<br>🎯 R:R: <b>2.5</b>',
    options:['🟢 Vào lệnh','🟡 Đợi thêm','🔴 Bỏ qua'], answer:0, winRate:62,
    okText:'Quyết định chuẩn! Thuận trend + tại hỗ trợ + stop rõ + R:R tốt. Giờ xem thị trường chạy 👇',
    badText:'Setup này đủ điều kiện VÀO (thuận trend, tại hỗ trợ, stop rõ, R:R 2.5). Cùng xem nó chạy 👇'},
    makeSetup({setupPivots:[100,114,107,123,116], stopPct:0.013, rr:2.5, outcome:'win'})));

  // B — FOMO đu đỉnh → đúng là ĐỢI/BỎ → playout cho thấy cú thua tránh được
  L.push(Object.assign({type:'setup', kind:'skip',
    prompt:'Đọc tình huống rồi quyết định:',
    context:'🚀 Coin vừa <b>tăng ~34% trong 1 giờ</b><br>😰 Bạn chưa kịp vào, sợ lỡ tàu<br>📍 Giá ở rất xa hỗ trợ<br>🛡️ Vào giờ thì stop ở đâu? Không rõ → R:R tệ',
    options:['🟢 Vào ngay kẻo lỡ!','🟡 Đợi nhịp điều chỉnh','🔴 Bỏ qua'], answer:1, winRate:33,
    okText:'Đúng! Đây là FOMO — đu sau khi giá đã chạy = mua đỉnh, stop mờ, R:R tệ. Xem điều gì xảy ra NẾU vào 👇',
    badText:'Cẩn thận FOMO! Giá đã chạy 34%, vào lúc này là mua đỉnh. Nên ĐỢI. Xem điều gì xảy ra nếu vào 👇'},
    makeSetup({setupPivots:[100,103,101,107,119,134], stopPct:0.02, rr:1.2, outcome:'loss'})));

  // C — TRỌNG TÂM: setup hoàn hảo → Vào → THUA (cú "đúng mà vẫn lỗ")
  L.push(Object.assign({type:'setup', kind:'enter',
    prompt:'Đọc setup rồi quyết định:',
    context:'🔼 Xu hướng: <b>TĂNG</b><br>📍 Giá tại <b>HỖ TRỢ mạnh</b><br>🛡️ Stop rõ ràng dưới hỗ trợ<br>🎯 R:R: <b>3.0</b> — rất tốt',
    options:['🟢 Vào lệnh','🟡 Đợi thêm','🔴 Bỏ qua'], answer:0, winRate:60,
    okText:'Quyết định HOÀN HẢO — đủ mọi điều kiện. Giờ xem thị trường... 👇',
    badText:'Đây là setup đáng VÀO (đủ confluence). Xem thị trường chạy... 👇'},
    makeSetup({setupPivots:[100,116,108,126,118], stopPct:0.012, rr:3.0, outcome:'loss'})));

  // D — chốt triết lý
  L.push({type:'choice', candles:null,
    prompt:'Vừa rồi: quyết định đúng vẫn có lúc thua, đu đỉnh đôi khi vẫn may. Vậy nên chấm bản thân theo gì?', hint:'',
    options:['🧠 Chất lượng quyết định — có đúng quy trình không','💰 Lệnh đó cuối cùng lời hay lỗ bao nhiêu','🍀 Lần đó mình có may mắn hay không'], answer:0,
    okText:'Chính xác! Đó là cả triết lý Pipu. Thắng/thua từng lệnh là xác suất; quy trình tốt lặp đủ lâu mới làm bạn lãi. Bạn vừa kiếm những điểm 🧠 xứng đáng!',
    badText:'Chưa đúng — và đây là bài học quan trọng nhất. Chấm theo lời/lỗ sẽ thưởng cho cả những lần liều ăn may. Hãy chấm theo QUY TRÌNH.'});

  return L;
}

function startDemoLesson(){
  audio();
  CURRENT_UNIT = -1;
  LESSON = buildDemoSetup(); idx=0; correctCount=0; totalAnswered=0;
  STATE.hearts=5; updateTop();
  show('lesson'); renderExercise();
}

function buildSlider(ex){
  const wrap=document.getElementById('choices');
  const box=document.createElement('div'); box.className='slider-box';
  const read=document.createElement('div'); read.className='slider-read';
  const inp=document.createElement('input'); inp.type='range'; inp.className='slider';
  inp.min=ex.min; inp.max=ex.max; inp.step=ex.step||1;
  inp.value = (ex.start!=null?ex.start:ex.min);
  const refresh=()=>{ read.innerHTML = ex.readout(parseFloat(inp.value)); };
  inp.addEventListener('input',()=>{ if(answered) return; picked=parseFloat(inp.value); sndTap(); refresh(); enableCheck(); });
  refresh();
  const ends=document.createElement('div'); ends.className='slider-ends';
  ends.innerHTML=`<span>${ex.endL!=null?ex.endL:ex.min}</span><span>${ex.endR!=null?ex.endR:ex.max}</span>`;
  box.appendChild(read); box.appendChild(inp); box.appendChild(ends);
  wrap.appendChild(box);
}

function buildChoices(ex){
  const choices=document.getElementById('choices');
  // Xáo trộn thứ tự 1 lần/bài → chống mẹo "đáp án đúng luôn ở vị trí cũ / luôn dài nhất".
  if(ex.options && ex.answer!=null && !ex._shuffled){
    const order = ex.options.map((_,i)=>i);
    for(let i=order.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [order[i],order[j]]=[order[j],order[i]]; }
    ex.options = order.map(i=>ex.options[i]);
    ex.answer  = order.indexOf(ex.answer);
    ex._shuffled = true;
  }
  ex.options.forEach((opt,i)=>{
    const b=document.createElement('button'); b.className='choice'; b.textContent=opt;
    b.onclick=()=>{ if(answered) return; picked=i; sndTap();
      choices.querySelectorAll('.choice').forEach(c=>c.classList.remove('sel'));
      b.classList.add('sel'); enableCheck(); };
    choices.appendChild(b);
  });
}

function streamReplay(ex){
  clearInterval(REPLAY_TIMER);
  answered=false; picked=null;
  document.getElementById('choices').innerHTML='';
  document.getElementById('checkBar').style.display='none';
  document.getElementById('feedback').style.display='none';
  document.getElementById('hint').textContent='Đang phát... nến hiện lần lượt theo thời gian.';
  document.getElementById('prompt').innerHTML='<span class="live-dot"></span>'+ex.prompt;
  document.getElementById('chartCard').style.display='block';
  const total=ex.candles.length;
  let n=1;
  requestAnimationFrame(()=>drawChart(ex.candles.slice(0,1),null));
  REPLAY_TIMER=setInterval(()=>{
    n++;
    drawChart(ex.candles.slice(0,n), n<total?new Set([n-1]):null);
    sndTick();
    if(n>=total){ clearInterval(REPLAY_TIMER); setTimeout(()=>revealReplay(ex),420); }
  },300);
}
function revealReplay(ex){
  drawChart(ex.candles,null);
  document.getElementById('prompt').textContent = ex.question;
  document.getElementById('hint').textContent = '';
  const choices=document.getElementById('choices'); choices.innerHTML='';
  const ctr=document.createElement('div'); ctr.className='replay-controls';
  const rb=document.createElement('button'); rb.className='replay-btn'; rb.textContent='▶ Xem lại nến chạy';
  rb.onclick=()=>streamReplay(ex); ctr.appendChild(rb); choices.appendChild(ctr);
  buildChoices(ex);
  document.getElementById('checkBar').style.display='block';
}

function enableCheck(){ const b=document.getElementById('checkBtn'); b.disabled=false; b.className='btn green greenD'; }
/* Khoá nút "Tiếp tục" vài trăm ms để người chơi kịp ĐỌC phản hồi, không bấm vội (góp ý GĐ0). */
function lockContinue(ms){
  const c=document.getElementById('contBtn'); c.disabled=true;
  clearTimeout(c._lockT); c._lockT=setTimeout(()=>{ c.disabled=false; }, ms);
}

function checkAnswer(){
  if(picked===null) return;
  const ex=LESSON[idx]; answered=true; totalAnswered++;
  let ok;
  if(ex.type==='tap'){
    ok = ex.correct.includes(picked);
    drawChart(ex.candles, new Set([picked]), ok ? null : new Set(ex.correct));
  } else if(ex.type==='slider'){
    ok = (ex.okMin!=null) ? (picked>=ex.okMin && picked<=ex.okMax)
                          : (Math.abs(picked-ex.correct)<=ex.tolerance);
  } else {
    ok = (picked===ex.answer);
    const ch=document.getElementById('choices').querySelectorAll('.choice');
    ch[ex.answer].classList.add('ok');
    if(!ok) ch[picked].classList.add('bad');
  }
  document.getElementById('checkBar').style.display='none';
  const fb=document.getElementById('feedback'); fb.style.display='block'; fb.classList.add('show');
  if(ok){
    correctCount++; STATE.xp+=10;
    fb.classList.add('good');
    document.getElementById('fbTitle').innerHTML='✅ Chính xác!';
    document.getElementById('fbText').textContent=ex.okText;
    sndCorrect();
  } else {
    if(CURRENT_UNIT !== 0){ // Unit 0 (kỳ vọng) không phạt tim — câu kiến thức chưa ai dạy
      STATE.hearts=Math.max(0,STATE.hearts-1);
      const hs=document.querySelector('.stat.heart'); hs.classList.add('shake');
      setTimeout(()=>hs.classList.remove('shake'),420);
    }
    fb.classList.add('bad');
    document.getElementById('fbTitle').innerHTML='❌ Chưa đúng';
    if(ex.options){ // hiện THẲNG đáp án đúng cho người chọn sai (góp ý GĐ0)
      document.getElementById('fbText').innerHTML =
        '👉 <b>Đáp án đúng:</b> '+ex.options[ex.answer]+'<br><br>'+ex.badText;
    } else {
      document.getElementById('fbText').textContent=ex.badText;
    }
    sndWrong();
  }
  if(ex.type==='setup'){
    // PHẦN THƯỞNG bắn theo QUYẾT ĐỊNH đúng quy trình — KHÔNG theo lãi/lỗ.
    if(ok){ STATE.mind++; confetti(); }
    document.getElementById('contBtn').style.display='none'; // chờ chart chạy xong mới cho qua
    updateTop(); saveState();
    playoutSetup(ex);
    return;
  }
  if(ex.type==='decision' && ex.winRate){
    document.getElementById('fbText').innerHTML += decisionReveal(ex);
  }
  updateTop(); saveState();
  lockContinue(800);
  if(STATE.hearts<=0){ document.getElementById('contBtn').textContent='Hết tim — thử lại'; }
}

function nextExercise(){
  clearInterval(REPLAY_TIMER);
  if(STATE.hearts<=0){ (CURRENT_UNIT===-1 ? startDemoLesson() : startLesson(CURRENT_UNIT)); return; }
  idx++;
  if(idx>=LESSON.length){ finishLesson(); return; }
  renderExercise();
}

function finishLesson(){
  // streak theo NGÀY thật: chỉ tính 1 lần/ngày, +1 nếu hôm qua có chơi, reset nếu đứt chuỗi
  const t = today();
  if(STATE.lastPlayed !== t){
    const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
    STATE.streak = (STATE.lastPlayed === yesterday) ? STATE.streak+1 : 1;
    STATE.lastPlayed = t;
  }
  STATE.xp += 20;
  updateTop(); sndFinish(); confetti();
  const acc = totalAnswered? Math.round(correctCount/totalAnswered*100):0;
  document.getElementById('prog').style.width='100%';
  document.getElementById('r-xp').textContent = (correctCount*10+20);
  document.getElementById('r-acc').textContent = acc+'%';
  document.getElementById('r-title').textContent = acc>=80?'Xuất sắc!':'Hoàn thành bài học!';
  document.getElementById('r-sub').textContent =
    (CURRENT_UNIT===-1) ? 'Bạn vừa trải nghiệm cách chấm TƯ DUY — không chấm kết quả.'
                        : (SUBTITLE[CURRENT_UNIT] || 'Hoàn thành bài học!');
  document.getElementById('r-take').innerHTML =
    (CURRENT_UNIT===-1)
      ? ('<b>🧠 Tổng Điểm Tư Duy của bạn: '+STATE.mind+'</b><br>'+
         'Điểm này thưởng cho <b>quyết định đúng quy trình</b> — kể cả khi lệnh thua. '+
         'Đó là cách Pipu giữ bạn quay lại mà không dạy tư duy con bạc.')
      : (TAKEAWAY[CURRENT_UNIT] || TAKEAWAY[1]);
  // mở khoá unit kế tiếp (bỏ qua với bài demo, CURRENT_UNIT = -1)
  if(CURRENT_UNIT>=0){
    const ci = UNITS.findIndex(u=>u.id===CURRENT_UNIT);
    if(ci>=0) UNITS[ci].status='done';
    if(UNITS[ci+1] && UNITS[ci+1].status==='locked') UNITS[ci+1].status='active';
  }
  saveState();
  show('result');
  startWhaleLoop();
}

function updateTop(){
  document.getElementById('t-hearts').textContent=STATE.hearts;
  document.getElementById('t-xp').textContent=STATE.xp;
  document.getElementById('t-streak').textContent=STATE.streak;
}

window.addEventListener('resize', redrawAll);

loadState(); initTheme(); renderPath(); updateTop();
startWhaleLoop();
</script>
